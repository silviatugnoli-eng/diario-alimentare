<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍎 Il Mio Diario Alimentare</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* --- MANTENGO TUTTO IL TUO CSS ORIGINALE --- */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FFF9F0;--paper:#FFFDF7;--ink:#2D1F1F;--ink-light:#7A6060;
  --col-mon:#FFE8D0;--col-tue:#D0EEFF;--col-wed:#D0FFE8;--col-thu:#EDD0FF;--col-fri:#FFEFD0;
  --col-sat:#FFD0D0;--col-sun:#FFD0D0;
  --green:#4CBB7A;--red:#F46B6B;--orange:#FF9F43;
  --sky:#5BA8F5;--lav:#9B7FE8;
}
body{
  background:#E8D5C4;
  background-image:radial-gradient(circle at 15% 15%,#F5C09A 0%,transparent 55%),
                   radial-gradient(circle at 85% 85%,#E8A07C 0%,transparent 55%);
  font-family:'Nunito',sans-serif;min-height:100vh;padding:16px;
}
.app-cover{
  max-width:960px;margin:0 auto 18px;
  background:linear-gradient(135deg,#FF7A5C,#FF5252);
  border-radius:18px;padding:22px 30px;
  box-shadow:5px 5px 0 #C0392B,0 8px 28px rgba(0,0,0,.18);
  display:flex;align-items:center;gap:18px;position:relative;overflow:hidden;
}
.cover-spiral{position:absolute;left:0;top:0;bottom:0;width:44px;background:linear-gradient(to right,rgba(0,0,0,.12),transparent)}
.cover-rings{position:absolute;left:8px;top:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:space-around;padding:12px 0}
.c-ring{width:22px;height:22px;border:3.5px solid rgba(255,255,255,.5);border-radius:50%;background:rgba(255,255,255,.2)}
.cover-icon{font-size:3rem;filter:drop-shadow(1px 2px 4px rgba(0,0,0,.2));padding-left:30px}
.cover-text .title{font-family:'Caveat',cursive;font-size:2.4rem;font-weight:700;color:#fff;text-shadow:1px 2px 4px rgba(0,0,0,.2)}
.cover-text .subtitle{font-family:'Caveat',cursive;font-size:1.1rem;color:rgba(255,255,255,.85)}
.notebook{
  max-width:960px;margin:0 auto;background:var(--paper);
  border-radius:4px 18px 18px 4px;
  box-shadow:-5px 0 0 #DDD0B0,5px 5px 0 #C8B090,0 8px 36px rgba(0,0,0,.14);
  position:relative;overflow:hidden;
}
.nb-spine{position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,#D8C8A0,#ECE0C4);z-index:5}
.nb-rings{position:absolute;left:4px;top:0;bottom:0;width:48px;display:flex;flex-direction:column;align-items:center;justify-content:space-around;padding:16px 0;z-index:10}
.nb-ring{width:26px;height:26px;border:4px solid #aaa;border-radius:50%;background:linear-gradient(135deg,#ccc,#888);box-shadow:inset 0 1px 3px rgba(0,0,0,.3)}
.nb-content{
  margin-left:56px;padding:24px 28px 36px;position:relative;
  background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent 31px,rgba(100,149,237,.13) 31px,rgba(100,149,237,.13) 32px);
  background-size:100% 32px;
}
.nb-content::before{content:'';position:absolute;left:32px;top:0;bottom:0;width:2px;background:rgba(255,90,90,.2)}
.month-nav{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
  background:rgba(255,255,255,.7);border-radius:14px;padding:12px 16px;
  border:2px dashed rgba(0,0,0,.1);flex-wrap:wrap;
}
.month-nav-arrow{font-size:1.4rem;cursor:pointer;background:none;border:none;transition:transform .15s;line-height:1;padding:4px}
.month-nav-arrow:hover{transform:scale(1.3)}
.month-label{font-family:'Caveat',cursive;font-size:1.8rem;font-weight:700;color:var(--ink);flex:1;text-align:center}
.btn-upload-pdf{
  font-family:'Caveat',cursive;font-size:1rem;font-weight:700;
  padding:8px 18px;background:linear-gradient(135deg,#FF9F43,#FF7A5C);
  border:2.5px solid #C0392B;border-radius:24px;color:#fff;cursor:pointer;
  box-shadow:2px 2px 0 #C0392B;transition:all .15s;white-space:nowrap;
}
.btn-upload-pdf:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #C0392B}
#pdfInput{display:none}
.pdf-status{font-family:'Patrick Hand',cursive;font-size:.85rem;padding:6px 14px;border-radius:20px;display:flex;align-items:center;gap:6px}
.pdf-status.none{background:#F0F0F0;color:#999;border:1.5px dashed #ccc}
.pdf-status.loading{background:#FFF3CD;color:#856404;border:1.5px solid #FFD700;animation:pulse 1s infinite}
.pdf-status.ok{background:#D4EDDA;color:#155724;border:1.5px solid #5BCB8A}
.pdf-status.err{background:#F8D7DA;color:#721C24;border:1.5px solid #F46B6B}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-header-cell{font-family:'Caveat',cursive;font-size:.95rem;font-weight:700;text-align:center;padding:6px 2px;border-radius:8px}
.ch-mon{color:#E67E22}.ch-tue{color:#2980B9}.ch-wed{color:#27AE60}
.ch-thu{color:#8E44AD}.ch-fri{color:#C0392B}.ch-sat{color:#E74C3C}.ch-sun{color:#E74C3C}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-day{
  border-radius:10px;min-height:72px;cursor:pointer;
  border:2px solid rgba(0,0,0,.08);padding:6px 6px 4px;
  display:flex;flex-direction:column;gap:2px;
  transition:all .18s;position:relative;
  box-shadow:2px 2px 0 rgba(0,0,0,.05);
}
.cal-day:hover{transform:translateY(-2px);box-shadow:3px 5px 0 rgba(0,0,0,.08);z-index:2}
.cal-day.today{border-color:var(--orange)!important;box-shadow:0 0 0 3px rgba(255,159,67,.3),2px 2px 0 var(--orange)}
.cal-day.selected{border-color:var(--sky)!important;box-shadow:0 0 0 3px rgba(91,168,245,.35),2px 2px 0 var(--sky);transform:translateY(-3px)}
.day-num{font-family:'Caveat',cursive;font-size:1.35rem;font-weight:700;line-height:1}
.day-school-dot{width:7px;height:7px;border-radius:50%;background:var(--green);margin-top:2px;align-self:flex-start}
.day-eaten-bar{margin-top:auto;height:5px;border-radius:3px;background:linear-gradient(90deg,var(--green),#7EE8A2)}
/* Colori giorni */
.cal-day[data-wd="1"]{background:var(--col-mon)}
.cal-day[data-wd="2"]{background:var(--col-tue)}
.cal-day[data-wd="3"]{background:var(--col-wed)}
.cal-day[data-wd="4"]{background:var(--col-thu)}
.cal-day[data-wd="5"]{background:var(--col-fri)}
.cal-day[data-wd="6"]{background:var(--col-sat)}
.cal-day[data-wd="0"]{background:var(--col-sun)}
</style>
</head>
<body>

<div class="app-cover">
  <div class="cover-spiral"></div>
  <div class="cover-rings"></div>
  <div class="cover-icon">🍎</div>
  <div class="cover-text">
    <div class="title">Il Mio Diario Alimentare</div>
    <div class="subtitle">✏️ Carica il menù PDF della scuola (Ribò)</div>
  </div>
</div>

<div class="notebook">
  <div class="nb-spine"></div>
  <div class="nb-rings"></div>
  <div class="nb-content">
    <div class="month-nav">
      <div class="month-label" id="monthLabel">Maggio 2026</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div class="pdf-status none" id="pdfStatus">📄 Nessun menù caricato</div>
        <button class="btn-upload-pdf" onclick="document.getElementById('pdfInput').click()">📤 Carica PDF</button>
        <input type="file" id="pdfInput" accept="application/pdf">
      </div>
    </div>

    <div class="cal-header">
      <div class="cal-header-cell ch-mon">Lun</div>
      <div class="cal-header-cell ch-tue">Mar</div>
      <div class="cal-header-cell ch-wed">Mer</div>
      <div class="cal-header-cell ch-thu">Gio</div>
      <div class="cal-header-cell ch-fri">Ven</div>
      <div class="cal-header-cell ch-sat">Sab</div>
      <div class="cal-header-cell ch-sun">Dom</div>
    </div>
    <div class="calendar" id="calendarGrid"></div>
  </div>
</div>

<script>
// --- LOGICA DI PARSING SPECIFICA PER RIBÒ ---
function parseRiboText(fullText) {
    const menuData = {};
    // Regex per trovare i giorni nel formato "lun 04 (S.8)"
    const dayRegex = /(lun|mar|mer|gio|ven)\s+(\d{2})\s+\(S\.\d\)/gi;
    
    let matches = [];
    let match;
    while ((match = dayRegex.exec(fullText)) !== null) {
        matches.push({
            day: parseInt(match[2]),
            index: match.index,
            fullMatch: match[0]
        });
    }

    for (let i = 0; i < matches.length; i++) {
        const start = matches[i].index + matches[i].fullMatch.length;
        const end = matches[i + 1] ? matches[i + 1].index : fullText.length;
        let dayBlock = fullText.substring(start, end);

        // Pulizia allergeni e righe vuote
        const items = dayBlock.split(/[|\n]/)
            .map(item => item.trim())
            .filter(item => {
                // Filtra stringhe che contengono solo allergeni
                const isAllergen = /^(glutine|soia|senape|latte|uova|pesce|sedano|sesamo|lupino|crostacei|molluschi|frutta a guscio|,|\s)+$/i.test(item);
                return item.length > 3 && !isAllergen && !item.includes("Snack");
            });

        if (items.length > 0) {
            menuData[matches[i].day] = {
                primo: items[0] || "",
                secondo: items[1] || "",
                contorno: items[2] || "",
                merenda: items[3] || ""
            };
        }
    }
    return menuData;
}

// Gestione dell'input file
document.getElementById('pdfInput').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const status = document.getElementById('pdfStatus');
    status.className = "pdf-status loading";
    status.innerText = "⏳ Analisi menù...";

    try {
        const reader = new FileReader();
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            let fullText = "";

            // Estrazione testo da tutte le pagine[cite: 1]
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(s => s.str).join(' ') + "\n";
            }

            const parsedMenu = parseRiboText(fullText);
            
            // Salvataggio temporaneo per sessione
            window.lastParsedMenu = parsedMenu;

            status.className = "pdf-status ok";
            status.innerText = "✅ Menù caricato!";
            renderCalendar(2026, 4); // Rendering per Maggio 2026 (Mese 4 in JS)
        };
        reader.readAsArrayBuffer(file);
    } catch (err) {
        status.className = "pdf-status err";
        status.innerText = "❌ Errore caricamento";
        console.error(err);
    }
});

function renderCalendar(year, month) {
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    // Correzione per far partire Lunedì come primo giorno
    const offset = firstDay === 0 ? 6 : firstDay - 1;

    for (let i = 0; i < offset; i++) {
        grid.innerHTML += '<div class="cal-empty"></div>';
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const menu = (window.lastParsedMenu && window.lastParsedMenu[day]) ? window.lastParsedMenu[day] : null;
        const wd = new Date(year, month, day).getDay();
        
        let content = `<div class="day-num">${day}</div>`;
        if (menu) {
            content += `<div style="font-size:0.6rem; color:var(--ink-light); margin-top:4px;">
                <b>P:</b> ${menu.primo.substring(0, 15)}...<br>
                <b>S:</b> ${menu.secondo.substring(0, 15)}...
            </div>`;
        }

        grid.innerHTML += `
            <div class="cal-day" data-wd="${wd}">
                ${content}
            </div>
        `;
    }
}

// Inizializza calendario vuoto al caricamento
window.onload = () => renderCalendar(2026, 4);
</script>
</body>
</html>
